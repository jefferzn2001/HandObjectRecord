# Camera calibration configuration for FPdata pipeline
# ZED2i (cam1) + RealSense D435 (cam2)
#
# Coordinate system: AprilTag defines WORLD frame
# Extrinsics: T_world_from_camera (4x4 matrix)
#
# Camera settings match record.py tuned values

# AprilTag configuration
apriltag:
  family: "tag36h11"
  id: 0
  tag_size_m: 0.16  # Black square size in meters (160mm)
  total_size_m: 0.20  # Total size with white border (200mm)

cam1:
  name: "ZED2i"
  resolution:
    width: 1280
    height: 720
    fps: 30
  # Factory intrinsics loaded from SDK -> saved to cam1_intrinsics.npy
  # Placeholder values (actual from setup_zed()):
  intrinsics: [[523.210449, 0.0, 631.599487], [0.0, 523.210449, 348.809387], [0.0, 0.0, 1.0]]
  # Camera settings (from record.py)
  exposure: 14        # SDK units (0-100)
  gain: 48            # SDK units (0-100)
  # Note: ZED SDK does not support manual white balance setting
  depth_mode: "NEURAL_PLUS"
  depth_min_m: 0.04
  depth_max_m: 2.686
  confidence: 100
  texture_confidence: 100
  depth_stability: 0
  rotated_180: false  # ZED is NOT mounted upside down

cam2:
  name: "RealSense D435"
  resolution:
    width: 848
    height: 480
    fps: 30
  # Factory intrinsics loaded from SDK -> saved to cam2_intrinsics.npy
  # Note: Intrinsics are adjusted for 180° rotation (cx' = width - cx, cy' = height - cy)
  # Placeholder values:
  intrinsics: [[424.0, 0.0, 424.0], [0.0, 424.0, 240.0], [0.0, 0.0, 1.0]]
  # Camera settings (from record.py)
  color_exposure: 160.0   # microseconds
  color_gain: 35.0
  depth_exposure: 100.0
  depth_gain: 50.0
  laser_power: 305.0
  preset_initial: "default"
  preset_frame_10: "default"
  preset_frame_20: "high_accuracy"
  depth_min_m: 0.04
  depth_max_m: 1.886
  rotated_180: true  # RealSense IS mounted upside down
